# Supabase local development configuration.
# For production settings, configure via the Supabase Dashboard.
# https://supabase.com/docs/guides/cli/config

[project]
id = "metusa-deal-analyzer"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
# Enable confirmations so generateLink produces a valid token,
# but the actual email is suppressed by the hook below.
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# ──────────────────────────────────────────────────────────────────────────────
# Send Email Hook
#
# Intercepts every email Supabase would send natively and suppresses it.
# The app sends all transactional emails via Brevo instead.
#
# Production: Dashboard → Authentication → Hooks → Send Email
#   → HTTP (POST) → https://<project>.supabase.co/functions/v1/suppress-email-hook
# ──────────────────────────────────────────────────────────────────────────────
[auth.hook.send_email]
enabled = true
uri = "http://host.docker.internal:3000/api/auth/suppress-email-hook"
