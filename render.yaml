services:
  # Python Flask backend (AI analysis, scraping, Land Registry, transport APIs)
  - type: web
    name: metusa-deal-analyzer
    runtime: python
    plan: free
    buildCommand: apt-get install -y wkhtmltopdf && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PROPERTY_DATA_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BENCHMARK_CRON_SECRET
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
