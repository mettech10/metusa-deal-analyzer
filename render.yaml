services:
  # Python Flask backend (AI analysis, scraping, Land Registry, transport APIs)
  - type: web
    name: metusa-deal-analyzer
    runtime: python
    plan: free
    buildCommand: apt-get install -y wkhtmltopdf && pip install -r requirements.txt && playwright install --with-deps chromium
    # Use gunicorn.conf.py so all tuning lives in one place (workers, threads,
    # timeout, preload_app=False to keep port-bind fast on Render free tier).
    startCommand: gunicorn -c gunicorn.conf.py app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PROPERTY_DATA_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BENCHMARK_CRON_SECRET
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: BRIGHTDATA_USERNAME
        sync: false
      - key: BRIGHTDATA_PASSWORD
        sync: false
      - key: BRIGHTDATA_HOST
        sync: false
      - key: AIRROI_API_KEY
        sync: false

  # Monthly benchmark refresh — pulls fresh Land Registry sold prices
  # and VOA rental data, recomputes yield/cashflow/growth medians, and
  # upserts into postcode_benchmarks. Hits /admin/api/update-benchmarks
  # with the shared X-Cron-Secret. The actual pipeline lives in
  # scripts/update_benchmarks.py and is invoked by the endpoint.
  - type: cron
    name: benchmark-monthly-refresh
    runtime: python
    plan: free
    schedule: "0 4 1 * *"  # 04:00 UTC on the 1st of each month
    buildCommand: pip install requests
    startCommand: |
      python -c "
      import os, sys, requests
      url = os.environ['BACKEND_URL'].rstrip('/') + '/admin/api/update-benchmarks?source=all'
      secret = os.environ['BENCHMARK_CRON_SECRET']
      r = requests.post(url, headers={'X-Cron-Secret': secret}, timeout=1800)
      print(r.status_code, r.text[:500])
      sys.exit(0 if r.status_code == 200 else 1)
      "
    envVars:
      - key: BACKEND_URL
        value: "https://metusa-deal-analyzer.onrender.com"
      - key: BENCHMARK_CRON_SECRET
        sync: false
