services:
  # Python Flask backend (AI analysis, scraping, Land Registry, transport APIs)
  - type: web
    name: metusa-deal-analyzer
    runtime: python
    plan: free
    buildCommand: apt-get install -y wkhtmltopdf && pip install -r requirements.txt && playwright install --with-deps chromium
    # Use gunicorn.conf.py so all tuning lives in one place (workers, threads,
    # timeout, preload_app=False to keep port-bind fast on Render free tier).
    startCommand: gunicorn -c gunicorn.conf.py app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PROPERTY_DATA_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BENCHMARK_CRON_SECRET
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: BRIGHTDATA_USERNAME
        sync: false
      - key: BRIGHTDATA_PASSWORD
        sync: false
      - key: BRIGHTDATA_HOST
        sync: false
      - key: AIRROI_API_KEY
        sync: false
