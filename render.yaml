services:
  # Python Flask backend (AI analysis, scraping, Land Registry, transport APIs)
  - type: web
    name: metusa-deal-analyzer
    runtime: python
    plan: free
    buildCommand: apt-get install -y wkhtmltopdf && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PROPERTY_DATA_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BENCHMARK_CRON_SECRET
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      # ── Bright Data Browser API (SpareRoom scraper) ──────────────────
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: BRIGHTDATA_USERNAME
        sync: false
      - key: BRIGHTDATA_PASSWORD
        sync: false
      - key: BRIGHTDATA_ZONE
        value: scraping_browser
      - key: BRIGHTDATA_HOST
        value: brd.superproxy.io
      - key: BRIGHTDATA_PORT
        value: "9222"
      # Force UK exit IP — SpareRoom shows a country-chooser modal
      # blocking the search form when accessed from a non-UK IP.
      - key: BRIGHTDATA_COUNTRY
        value: gb
      # ── Airroi API (Airbnb market data for SA/R2SA) ─────────────────
      - key: AIRROI_API_KEY
        sync: false
      - key: SCRAPER_SECRET
        sync: false
      - key: SCRAPER_CONCURRENCY
        value: "5"
      - key: SCRAPER_DELAY_MS
        value: "1500"

  # ── SpareRoom bulk scraper cron job (weekly, populates spareroom_listings) ──
  # Runs every Monday at 03:00 UTC. The 13-day skip check inside scrape_bulk()
  # means each location only re-scrapes every ~2 weeks even if run more often.
  - type: cron
    name: spareroom-bulk-scraper
    runtime: python
    schedule: "0 3 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python spareroom_bulk_job.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NEXT_PUBLIC_SUPABASE_URL
        fromService:
          name: metusa-deal-analyzer
          type: web
          envVarKey: NEXT_PUBLIC_SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromService:
          name: metusa-deal-analyzer
          type: web
          envVarKey: SUPABASE_SERVICE_ROLE_KEY
      - key: BRIGHTDATA_USERNAME
        fromService:
          name: metusa-deal-analyzer
          type: web
          envVarKey: BRIGHTDATA_USERNAME
      - key: BRIGHTDATA_PASSWORD
        fromService:
          name: metusa-deal-analyzer
          type: web
          envVarKey: BRIGHTDATA_PASSWORD
      - key: BRIGHTDATA_ZONE
        value: scraping_browser
      - key: BRIGHTDATA_HOST
        value: brd.superproxy.io
      - key: BRIGHTDATA_PORT
        value: "9222"
      - key: BRIGHTDATA_COUNTRY
        value: gb
