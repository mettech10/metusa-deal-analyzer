<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Metalyzi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --background: oklch(0.12 0.015 260);
            --foreground: oklch(0.95 0.005 260);
            --card: oklch(0.16 0.015 260);
            --primary: oklch(0.75 0.15 190);
            --muted-foreground: oklch(0.6 0.01 260);
            --border: oklch(0.25 0.02 260);
            --success: #22c55e;
            --danger: #ef4444;
            --radius: 0.625rem;
            --sidebar-w: 260px;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--background); 
            color: var(--foreground); 
            min-height: 100vh;
        }
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-w); height: 100vh;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 100;
        }
        .sidebar-brand {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .logo-img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; }
        .brand-name { font-size: 16px; font-weight: 600; }
        .brand-sub { font-size: 11px; color: var(--muted-foreground); }
        .nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; border-radius: calc(var(--radius) - 2px);
            cursor: pointer; font-size: 14px; font-weight: 500;
            color: var(--muted-foreground); transition: all 0.15s;
            text-decoration: none;
        }
        .nav-item:hover { background: oklch(0.2 0.015 260); color: var(--foreground); }
        .nav-item.active { background: rgba(45, 212, 191, 0.15); color: var(--primary); }
        .nav-icon { font-size: 18px; width: 20px; text-align: center; }
        .nav-badge {
            margin-left: auto; background: var(--danger);
            color: #fff; font-size: 11px; font-weight: 600;
            padding: 2px 8px; border-radius: 10px; min-width: 20px; text-align: center;
        }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-avatar {
            width: 32px; height: 32px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; color: var(--background);
        }
        .user-name { font-size: 13px; font-weight: 600; }
        .user-role { font-size: 11px; color: var(--muted-foreground); }
        .btn-logout {
            display: flex; align-items: center; gap: 8px;
            width: 100%; padding: 10px 12px;
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: calc(var(--radius) - 2px);
            color: #fca5a5; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.2); }
        .main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
        .topbar {
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar h1 { font-size: 20px; font-weight: 600; }
        .status-badge {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 20px;
            font-size: 13px;
            color: var(--success);
        }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .content { padding: 28px; flex: 1; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.15s;
        }
        .stat-card:hover { border-color: var(--primary); }
        .stat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .stat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .stat-icon.blue { background: rgba(59, 130, 246, 0.15); }
        .stat-icon.green { background: rgba(34, 197, 94, 0.15); }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.15); }
        .stat-icon.red { background: rgba(239, 68, 68, 0.15); }
        .stat-label { font-size: 13px; color: var(--muted-foreground); font-weight: 500; }
        .stat-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .stat-change { font-size: 12px; color: var(--muted-foreground); }
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .section-title { font-size: 16px; font-weight: 600; }
        .refresh-btn {
            padding: 8px 16px;
            background: oklch(0.2 0.015 260);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) - 2px);
            color: var(--foreground);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .refresh-btn:hover { background: var(--primary); color: var(--background); }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px; text-align: left; font-size: 13px; }
        .data-table th { color: var(--muted-foreground); font-weight: 500; border-bottom: 1px solid var(--border); }
        .data-table td { border-bottom: 1px solid var(--border); }
        .data-table tr:last-child td { border-bottom: none; }
        .loading { text-align: center; padding: 40px; color: var(--muted-foreground); }
        .empty { text-align: center; padding: 40px; color: var(--muted-foreground); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="/logo.png" alt="Metalyzi" class="logo-img">
            <div>
                <div class="brand-name">Metalyzi</div>
                <div class="brand-sub">Admin Dashboard</div>
            </div>
        </div>
        <nav class="nav">
            <a href="#" class="nav-item active"><span class="nav-icon">🏠</span> Overview</a>
            <a href="#" class="nav-item"><span class="nav-icon">📊</span> Analytics</a>
            <a href="#" class="nav-item"><span class="nav-icon">⚠️</span> Errors <span class="nav-badge" id="errorBadge" style="display:none">0</span></a>
            <a href="#" class="nav-item"><span class="nav-icon">📋</span> Activity</a>
            <a href="#" class="nav-item"><span class="nav-icon">⚙️</span> System</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">A</div>
                <div><div class="user-name">admin</div><div class="user-role">Administrator</div></div>
            </div>
            <button class="btn-logout" onclick="logout()">🚪 Sign Out</button>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <h1>Overview</h1>
            <div class="status-badge"><span class="status-dot"></span> Live</div>
        </header>

        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header"><div class="stat-icon blue">👥</div><span class="stat-label">Total Visits</span></div>
                    <div class="stat-value" id="totalVisits">-</div>
                    <div class="stat-change">All time</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><div class="stat-icon green">📅</div><span class="stat-label">Today</span></div>
                    <div class="stat-value" id="todayVisits">-</div>
                    <div class="stat-change">Last 24 hours</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><div class="stat-icon orange">📈</div><span class="stat-label">This Week</span></div>
                    <div class="stat-value" id="weekVisits">-</div>
                    <div class="stat-change">Last 7 days</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header"><div class="stat-icon red">🐛</div><span class="stat-label">Errors</span></div>
                    <div class="stat-value" id="errorCount">-</div>
                    <div class="stat-change" id="errorStatus">Checking...</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header"><h3 class="section-title">Recent Activity</h3><button class="refresh-btn" onclick="loadData()">🔄 Refresh</button></div>
                <table class="data-table" id="activityTable">
                    <thead><tr><th>Page</th><th>Time</th><th>Status</th></tr></thead>
                    <tbody><tr><td colspan="3" class="loading">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Session check
        if (sessionStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = '/admin/login';
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = '/admin/login';
        }

        async function loadData() {
            try {
                // Load visits
                const visitsRes = await fetch('/api/admin/track-visit');
                const visitsData = await visitsRes.json();
                
                document.getElementById('totalVisits').textContent = visitsData.totalVisits || 0;
                document.getElementById('todayVisits').textContent = visitsData.todayVisits || 0;
                document.getElementById('weekVisits').textContent = visitsData.weekVisits || 0;
                
                // Update activity table
                const tbody = document.querySelector('#activityTable tbody');
                if (visitsData.recentActivity && visitsData.recentActivity.length > 0) {
                    tbody.innerHTML = visitsData.recentActivity.map(a => 
                        `<tr><td>${a.page}</td><td>${a.time}</td><td>✅ Success</td></tr>`
                    ).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty">No activity yet</td></tr>';
                }
                
                // Load errors
                const errorsRes = await fetch('/api/admin/track-error');
                const errorsData = await errorsRes.json();
                
                document.getElementById('errorCount').textContent = errorsData.unresolvedErrors || 0;
                document.getElementById('errorStatus').textContent = errorsData.unresolvedErrors > 0 ? 'Needs attention' : 'All good';
                
                // Show error badge if there are errors
                if (errorsData.unresolvedErrors > 0) {
                    document.getElementById('errorBadge').textContent = errorsData.unresolvedErrors;
                    document.getElementById('errorBadge').style.display = 'block';
                }
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }

        // Load on startup
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
