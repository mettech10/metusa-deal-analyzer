<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Metalyzi Deal Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            /* Updated to match Metalyzi teal theme */
            --background: oklch(0.12 0.015 260);
            --foreground: oklch(0.95 0.005 260);
            --card: oklch(0.16 0.015 260);
            --primary: oklch(0.75 0.15 190);
            --primary-foreground: oklch(0.12 0.015 260);
            --muted: oklch(0.2 0.015 260);
            --muted-foreground: oklch(0.6 0.01 260);
            --border: oklch(0.25 0.02 260);
            --input: oklch(0.2 0.02 260);
            --ring: oklch(0.75 0.15 190);
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 0.625rem;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(45,212,191,0.15), transparent),
                radial-gradient(ellipse 60% 40% at 50% 120%, rgba(45,212,191,0.08), transparent);
            pointer-events: none;
        }
        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .logo-text { font-size: 16px; font-weight: 600; color: var(--foreground); }
        .logo-sub { font-size: 11px; color: var(--muted-foreground); font-weight: 500; letter-spacing: 0.03em; }
        
        h1 { 
            font-size: 20px; 
            font-weight: 600; 
            margin-bottom: 4px;
            color: var(--foreground);
        }
        .subtitle { 
            color: var(--muted-foreground); 
            font-size: 14px; 
            margin-bottom: 24px; 
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: calc(var(--radius) - 2px);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: flex-start;
            gap: 8px;
            border: 1px solid;
        }
        .alert.show { display: flex; }
        .alert-danger { 
            background: rgba(239,68,68,0.1); 
            border-color: rgba(239,68,68,0.3); 
            color: #fca5a5; 
        }
        .alert-success { 
            background: rgba(34,197,94,0.1); 
            border-color: rgba(34,197,94,0.3); 
            color: #86efac; 
        }
        .alert-info { 
            background: rgba(45,212,191,0.1); 
            border-color: rgba(45,212,191,0.3); 
            color: #2dd4bf; 
        }
        
        .form-group { margin-bottom: 16px; }
        label { 
            display: block; 
            font-size: 13px; 
            font-weight: 500; 
            color: var(--muted-foreground); 
            margin-bottom: 6px; 
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) - 2px);
            padding: 10px 12px;
            font-size: 14px;
            color: var(--foreground);
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(45,212,191,0.2);
        }
        input::placeholder { color: var(--muted-foreground); opacity: 0.6; }
        
        .btn-login {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: var(--primary-foreground);
            border: none;
            border-radius: calc(var(--radius) - 2px);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:active { transform: translateY(1px); }
        .btn-login:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        
        .security-note {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--muted-foreground);
        }
        .test-creds {
            margin-top: 16px;
            padding: 12px;
            background: var(--muted);
            border-radius: calc(var(--radius) - 2px);
            font-size: 12px;
            color: var(--muted-foreground);
            text-align: center;
        }
        .test-creds strong {
            color: var(--primary);
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">📊</div>
            <div>
                <div class="logo-text">Metalyzi</div>
                <div class="logo-sub">Admin Portal</div>
            </div>
        </div>

        <h1>Admin Login</h1>
        <p class="subtitle">Restricted access for authorised personnel.</p>

        <!-- Error Alert -->
        <div id="errorAlert" class="alert alert-danger">
            ⚠ <span id="errorMessage">Invalid credentials</span>
        </div>

        <!-- Success Alert -->
        <div id="successAlert" class="alert alert-success">
            ✅ Login successful! Redirecting...
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" 
                       placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" 
                       placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login" id="submitBtn">
                Sign In
            </button>
        </form>

        <div class="test-creds">
            🔑 Test Credentials<br>
            Username: <strong>admin</strong><br>
            Password: <strong>admin123</strong>
        </div>

        <p class="security-note">
            Secured with session authentication
        </p>
    </div>

    <script>
        // Test credentials
        const TEST_USERNAME = 'admin';
        const TEST_PASSWORD = 'admin123';

        const form = document.getElementById('loginForm');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        function showError(msg) {
            errorMessage.textContent = msg;
            errorAlert.classList.add('show');
            successAlert.classList.remove('show');
        }

        function showSuccess() {
            errorAlert.classList.remove('show');
            successAlert.classList.add('show');
        }

        function hideAlerts() {
            errorAlert.classList.remove('show');
            successAlert.classList.remove('show');
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            hideAlerts();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // Validate
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            // Check credentials
            if (username === TEST_USERNAME && password === TEST_PASSWORD) {
                showSuccess();
                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in...';
                
                // Store session
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminUser', username);
                
                // Redirect to dashboard after 1 second
                setTimeout(() => {
                    window.location.href = '/admin/dashboard';
                }, 1000);
            } else {
                showError('Invalid username or password');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = '/admin/dashboard';
        }
    </script>
</body>
</html>
